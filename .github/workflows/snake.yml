name: snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: NikitaSuprun
          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=FAB387&color_dots=#ebedf0,#FBC9A6,#FAB387,#E8915A,#C2410C
            dist/github-snake-dark.svg?palette=github-dark&color_snake=FAB387&color_dots=#1B1E27,#3A4150,#FBC9A6,#FAB387,#E8915A

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
