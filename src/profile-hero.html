<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;}
  .hero{ position:relative; width:1500px; height:420px; overflow:hidden;
    background:
      radial-gradient(circle at 85% 22%, rgba(250,179,135,.24), transparent 46%),
      linear-gradient(120deg,#1B1E27 0%, #232733 58%, #2A2E3A 100%);
    -webkit-print-color-adjust:exact; display:flex; align-items:center; gap:64px; padding:0 110px; }
  .dots{ position:absolute; inset:0; background-image:radial-gradient(#3A4150 1.1px, transparent 1.1px);
    background-size:30px 30px; opacity:.20; }
  .ns{ position:relative; width:156px; height:156px; border-radius:40px; flex:none;
    background:#FAB387; color:#1B1E27; display:grid; place-items:center;
    font-family:"Bricolage Grotesque",sans-serif; font-weight:800; font-size:88px; letter-spacing:-6px;
    box-shadow:0 26px 60px rgba(0,0,0,.45); }
  .right{ position:relative; }
  h1{ font-family:"Bricolage Grotesque",sans-serif; font-weight:800; font-size:82px; letter-spacing:-3px;
    color:#CDD6F4; line-height:.98; margin:0; }
  h1 .p{ color:#FAB387; }
  .pitch{ font-family:"Bricolage Grotesque",sans-serif; font-weight:400; font-size:33px; color:#CDD6F4;
    margin-top:20px; letter-spacing:-.5px; }
  .pitch b{ font-weight:700; color:#FAB387; }
  .sub{ font-family:"JetBrains Mono",monospace; font-weight:500; font-size:18px; letter-spacing:1.5px;
    color:#FBC9A6; margin-top:18px; }
</style></head>
<body><div class="hero"><div class="dots"></div>
  <div class="ns">NS</div>
  <div class="right">
    <h1>Nikita Supru<span class="p">n</span></h1>
    <div class="pitch">Good models need better systems. <b>I build both.</b></div>
    <div class="sub">$ ~ software engineer · backend · ML · a bit of hardware</div>
  </div>
</div></body></html>
